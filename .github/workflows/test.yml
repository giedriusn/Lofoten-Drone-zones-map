name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Pure-module unit tests (tile math, no-fly geometry, offline-asset invariants).
      # No dependencies — Node's built-in test runner. Explicit file list so the
      # runner never tries to execute non-test scripts like build-data.mjs.
      - run: node --test scripts/tiles.test.mjs scripts/geometry.test.mjs scripts/offline-assets.test.mjs scripts/season.test.mjs
